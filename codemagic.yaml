workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: OpticostKI
    environment:
      groups:
        - apple
      ios_signing:
        distribution_type: app_store
        bundle_identifier: de.barntrup.meinestadt
      xcode: latest
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project "BarntrupMeinestadt.xcodeproj"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "BarntrupMeinestadt.xcodeproj" \
            --scheme "BarntrupMeinestadt"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false